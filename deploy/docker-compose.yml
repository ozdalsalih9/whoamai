services:
  telegram-bot:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: whoamai-telegram-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ../.env
        required: false
    environment:
      OLLAMA_BASE_URL: "http://172.17.0.1:11434"
    volumes:
      - whoamai-bot-data:/app/data
      - ../knowledge:/app/knowledge:ro

volumes:
  whoamai-bot-data:
