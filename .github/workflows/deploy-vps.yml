name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"

          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error::Missing VPS_HOST. Add it as a Repository secret or Repository variable named VPS_HOST."
            exit 1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error::Missing GitHub secret VPS_SSH_KEY. This must be a Repository secret."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/whoamai_vps_key
          chmod 600 ~/.ssh/whoamai_vps_key

          if ! ssh-keygen -y -f ~/.ssh/whoamai_vps_key > /dev/null; then
            echo "::error::VPS_SSH_KEY is not a valid OpenSSH private key, or it has a passphrase"
            exit 1
          fi

          if ! ssh-keyscan -T 10 -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Could not reach VPS_HOST on SSH port $VPS_PORT. Check VPS_HOST, VPS_PORT, firewall, and sshd."
            exit 1
          fi

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR || vars.VPS_APP_DIR }}
          VPS_USE_TUNNEL: ${{ secrets.VPS_USE_TUNNEL || vars.VPS_USE_TUNNEL }}
        run: |
          set -euo pipefail
          VPS_PORT="${VPS_PORT:-22}"

          if [ -z "${VPS_HOST:-}" ]; then
            echo "::error::Missing VPS_HOST. Add it as a Repository secret or Repository variable named VPS_HOST."
            exit 1
          fi
          VPS_USER="${VPS_USER:-root}"

          set +e
          ssh -p "$VPS_PORT" -i ~/.ssh/whoamai_vps_key "$VPS_USER@$VPS_HOST" \
            'bash -s' -- "$VPS_APP_DIR" "${VPS_USE_TUNNEL:-false}" <<'REMOTE' 2>&1 | tee remote-deploy.log
          set -euo pipefail

          APP_DIR_INPUT="${1:-}"
          USE_TUNNEL="${2:-false}"
          APP_DIR=""

          if ! command -v git >/dev/null 2>&1; then
            echo "git is not installed on the VPS. Installing git."
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y git
            else
              apt-get update
              apt-get install -y git
            fi
          fi

          for candidate in \
            "$APP_DIR_INPUT" \
            "$HOME/whoamai" \
            "$HOME/WhoAmAI" \
            "/root/whoamai" \
            "/root/WhoAmAI"
          do
            if [ -n "$candidate" ] && [ -d "$candidate/.git" ]; then
              APP_DIR="$candidate"
              break
            fi
          done

          if [ -z "$APP_DIR" ]; then
            APP_DIR="${APP_DIR_INPUT:-$HOME/whoamai}"
            echo "No existing checkout found. Cloning repository into $APP_DIR."
            mkdir -p "$(dirname "$APP_DIR")"
            git clone https://github.com/ozdalsalih9/whoamai.git "$APP_DIR"
          fi

          echo "Deploying from $APP_DIR as $(whoami)."
          cd "$APP_DIR"
          git config --global --add safe.directory "$APP_DIR"

          wait_for_health() {
            local attempts="${1:-30}"
            local delay_seconds="${2:-3}"

            for attempt in $(seq 1 "$attempts"); do
              if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
                echo "Health check passed on attempt $attempt."
                return 0
              fi
              echo "Health check attempt $attempt/$attempts failed; waiting ${delay_seconds}s..."
              sleep "$delay_seconds"
            done

            echo "::error::Telegram bot health check failed after ${attempts} attempts."
            docker ps -a --filter "name=whoamai-telegram-bot"
            docker logs --tail=160 whoamai-telegram-bot || true
            return 1
          }

          git fetch --prune https://github.com/ozdalsalih9/whoamai.git main
          git checkout main || git checkout -b main
          git merge --ff-only FETCH_HEAD

          COMPOSE_FILES="-f deploy/docker-compose.yml"
          if [ "$USE_TUNNEL" = "true" ]; then
            COMPOSE_FILES="$COMPOSE_FILES -f deploy/docker-compose.tunnel.yml"
          fi

          docker rm -f whoamai-whatsapp-bot >/dev/null 2>&1 || true

          # Do not use --remove-orphans here. Webhook mode may depend on an existing
          # tunnel/reverse-proxy container that is intentionally managed separately.
          docker compose $COMPOSE_FILES up -d --build
          wait_for_health 40 3

          if [ -x deploy/reindex-knowledge.sh ]; then
            ./deploy/reindex-knowledge.sh
          else
            chmod +x deploy/reindex-knowledge.sh
            ./deploy/reindex-knowledge.sh
          fi

          wait_for_health 20 3
          docker ps --filter "name=whoamai-telegram-bot" --filter "status=running" --format "{{.Names}}" | grep -q '^whoamai-telegram-bot$'
          if [ "$USE_TUNNEL" = "true" ]; then
            docker ps --filter "name=whoamai-cloudflared" --filter "status=running" --format "{{.Names}}" | grep -q '^whoamai-cloudflared$'
          fi
          docker logs --tail=80 whoamai-telegram-bot
          REMOTE
          ssh_status=${PIPESTATUS[0]}
          set -e

          if [ "$ssh_status" -ne 0 ]; then
            deploy_tail="$(python3 - <<'PY'
from pathlib import Path

lines = Path("remote-deploy.log").read_text(errors="replace").splitlines()[-60:]
text = "\n".join(lines)
print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))
PY
)"
            echo "::error title=Deploy over SSH failed::SSH deploy command exited with status $ssh_status.%0A${deploy_tail}"
            exit "$ssh_status"
          fi
